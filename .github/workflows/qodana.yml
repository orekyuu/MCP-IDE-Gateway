name: Qodana

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Qodana Fix (FQN only)
        if: github.event_name == 'pull_request'
        uses: JetBrains/qodana-action@v2024.3
        with:
          config-path: qodana-fix.yaml
          results-dir: ${{ runner.temp }}/qodana-fix/results
          cache-dir: ${{ runner.temp }}/qodana-fix/cache

      - name: Commit Qodana fixes
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "fix: apply Qodana FQN auto-fixes" && git push)

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2024.3
        with:
          upload-result: true
          pr-mode: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
